<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valipod Engine</title>
    <!-- Use the most authoritative CDN for Chrome -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
    <style>
        :root { --bg: #030712; --accent: #0ea5e9; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: auto; border: 1px solid #1f2937; border-radius: 16px; padding: 40px 20px; background: #111827; }
        .st { font-size: 10px; color: var(--accent); margin-top: 20px; font-weight: 800; letter-spacing: 1px; }
        .btn { display: none; background: var(--accent); color: white; padding: 14px; border-radius: 8px; border: none; width: 100%; margin-top: 20px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card" onclick="document.getElementById('fi').click()">
        <input type="file" id="fi" hidden accept=".pdf">
        <div style="font-weight: 600;">Click to Convert PDF</div>
        <div class="st" id="st">VERIFYING ENGINE...</div>
    </div>
    <button class="btn" id="db">DOWNLOAD .DOCX</button>

    <script>
        // Use a "Safe Reference" to bypass MIME-type blocks
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        const docx = window.docx;

        window.onload = () => {
            if (pdfjsLib && docx) {
                document.getElementById('st').innerText = "SYSTEM SECURE: READY";
            } else {
                document.getElementById('st').innerText = "ENGINE OFFLINE: TRY INCOGNITO MODE";
            }
        };

        document.getElementById('fi').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const st = document.getElementById('st');
            st.innerText = "LOCAL RECONSTRUCTION IN PROGRESS...";

            try {
                // Pointing to the worker on a stable CDN[cite: 1]
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const sections = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    
                    // High-fidelity coordinate mapping
                    const lines = {};
                    text.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) lines[y] = [];
                        lines[y].push(item);
                    });

                    const children = Object.keys(lines).sort((a,b) => b-a).map(y => {
                        const lineText = lines[y].sort((a,b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                        return new docx.Paragraph({ children: [new docx.TextRun({ text: lineText, size: 22 })] });
                    });
                    sections.push({ children });
                }

                const doc = new docx.Document({ sections });
                const blob = await docx.Packer.toBlob(doc);
                
                st.innerText = "✓ CONVERSION SUCCESS";
                const db = document.getElementById('db');
                db.style.display = "block";
                db.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                    a.click();
                };
            } catch (err) {
                st.innerText = "HALT: CHECK BROWSER PERMISSIONS";
                console.error(err);
            }
        };
    </script>
</body>
</html>
