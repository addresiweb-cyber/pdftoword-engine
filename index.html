<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valipod Engine</title>
    <!-- Pre-loading libraries as high-priority assets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.min.js"></script>
    
    <style>
        :root { --bg: #030712; --accent: #0ea5e9; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .drop-zone { border: 2px dashed #374151; border-radius: 12px; padding: 40px 20px; cursor: pointer; background: #111827; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--accent); }
        .btn { display: none; background: var(--accent); color: white; padding: 15px; border-radius: 8px; border: none; width: 100%; cursor: pointer; margin-top: 15px; font-weight: bold; }
        #st { font-size: 11px; color: var(--accent); margin-top: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="drop-zone" id="dz">
        <input type="file" id="fi" hidden accept=".pdf">
        <div id="idle">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent); margin-bottom:10px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <p style="margin:0;"><strong>Click to Convert PDF</strong></p>
        </div>
        <div id="st">INITIALIZING ENGINE...</div>
    </div>
    <button class="btn" id="db">DOWNLOAD WORD (.DOCX)</button>

    <script>
        const fi = document.getElementById('fi'), dz = document.getElementById('dz'), 
              st = document.getElementById('st'), db = document.getElementById('db');

        // Verify libraries are loaded on page birth
        window.onload = () => {
            if (window['pdfjs-dist/build/pdf'] && window.docx) {
                st.innerText = "READY FOR LOCAL CONVERSION";
            } else {
                st.innerText = "SECURITY ERROR: REFRESH PAGE";
                st.style.color = "#ef4444";
            }
        };

        dz.onclick = () => fi.click();

        fi.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            st.innerText = "RECONSTRUCTING PDF...";
            try {
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const sections = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    st.innerText = `PROCESSING PAGE ${i}/${pdf.numPages}...`;
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    
                    // Logic-First layout grouping for high-fidelity
                    const lines = {};
                    text.items.forEach(item => {
                        const y = Math.round(item.transform[5] / 4) * 4;
                        if (!lines[y]) lines[y] = [];
                        lines[y].push(item);
                    });

                    const children = Object.keys(lines).sort((a,b) => b-a).map(y => {
                        const lineText = lines[y].sort((a,b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                        return new docx.Paragraph({ 
                            children: [new docx.TextRun({ text: lineText, size: 22 })],
                            spacing: { before: 120 }
                        });
                    });
                    sections.push({ children });
                }

                const doc = new docx.Document({ sections });
                const blob = await docx.Packer.toBlob(doc);
                
                st.innerText = "✓ CONVERSION COMPLETE";
                st.style.color = "#22c55e";
                db.style.display = "block";
                db.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                    a.click();
                };
            } catch (err) {
                st.innerText = "HALT: LOCAL FILE ERROR";
                console.error(err);
            }
        };
    </script>
</body>
</html>
