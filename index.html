<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valipod PDF-to-Word | Private & Secure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: #111827; --accent: #0ea5e9; --success: #22c55e; --text: #f3f4f6; --muted: #9ca3af; --border: #1f2937; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-card { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .hero h1 { font-size: 2.2rem; font-weight: 900; margin: 0 0 10px 0; letter-spacing: -1px; background: linear-gradient(to right, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--muted); font-size: 0.95rem; margin-bottom: 30px; }
        .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 60px 20px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(14, 165, 233, 0.05); }
        .status-text { font-size: 11px; font-weight: 800; color: var(--accent); margin-top: 20px; text-transform: uppercase; letter-spacing: 1.5px; }
        .progress-container { display: none; width: 100%; background: #1f2937; height: 4px; border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.3s ease; }
        .btn-download { display: none; width: 100%; background: var(--accent); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; margin-top: 25px; cursor: pointer; transition: 0.2s; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.5); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="hero">
        <h1>PDF to Word</h1>
        <p>Reconstruct documents privately in your browser.</p>
    </div>

    <div class="drop-zone" id="dz">
        <input type="file" id="fi" hidden accept="application/pdf">
        <div id="idle-view">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent); margin-bottom:15px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <h3 style="margin:0;">Select PDF File</h3>
            <p style="font-size: 12px; color: var(--muted); margin-top: 8px;">No data leaves your device</p>
        </div>
        <div class="status-text" id="st">Engine Standby</div>
    </div>

    <div class="progress-container" id="pc">
        <div class="progress-bar" id="pb"></div>
    </div>

    <button class="btn-download" id="db">DOWNLOAD .DOCX FILE</button>
</div>

<script>
    const st = document.getElementById('st'), fi = document.getElementById('fi'), 
          dz = document.getElementById('dz'), db = document.getElementById('db'),
          pc = document.getElementById('pc'), pb = document.getElementById('pb');

    dz.onclick = () => fi.click();

    fi.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // UI Transition
        st.innerText = "Securing Environment...";
        pc.style.display = "block";
        pb.style.width = "10%";

        try {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            
            // THE FIX: We use an empty string for the worker. 
            // This forces the library to use the "FakeWorker", which is 
            // immune to browser permission and cross-origin blocks.
            pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 

            const arrayBuffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({
                data: arrayBuffer,
                disableWorker: true, // This is the shield against "System Errors"
                verbosity: 0
            });

            const pdf = await loadingTask.promise;
            const sections = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                st.innerText = `Reconstructing Page ${i} / ${pdf.numPages}`;
                pb.style.width = `${(i / pdf.numPages) * 85}%`;

                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // Group text into logical rows
                const rows = {};
                textContent.items.forEach(item => {
                    const y = Math.round(item.transform[5]);
                    if (!rows[y]) rows[y] = [];
                    rows[y].push(item);
                });

                const paragraphs = Object.keys(rows).sort((a, b) => b - a).map(y => {
                    const lineText = rows[y].sort((a, b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                    return new docx.Paragraph({
                        children: [new docx.TextRun({ text: lineText, size: 22 })],
                        spacing: { before: 120 }
                    });
                });

                sections.push({ children: paragraphs });
            }

            pb.style.width = "100%";
            st.innerText = "✓ Conversion Successful";
            st.style.color = "var(--success)";
            db.style.display = "block";

            db.onclick = () => {
                const doc = new docx.Document({ sections });
                docx.Packer.toBlob(doc).then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            };

        } catch (err) {
            console.error(err);
            st.innerText = "Error: Use a Standard PDF File";
            st.style.color = "#ef4444";
            pb.style.background = "#ef4444";
        }
    };
</script>

</body>
</html>
