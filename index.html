<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valipod Engine | Secure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.min.js"></script>
    <style>
        :root { --bg: #030712; --accent: #0ea5e9; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; text-align: center; padding: 20px; margin: 0; }
        .card { max-width: 400px; margin: 40px auto; border: 2px dashed #374151; border-radius: 16px; padding: 50px 20px; background: #111827; cursor: pointer; }
        #st { font-size: 11px; color: var(--accent); margin-top: 15px; font-weight: 800; text-transform: uppercase; }
        .btn { display: none; background: var(--accent); color: white; padding: 16px; border-radius: 10px; border: none; width: 100%; max-width: 400px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card" id="dz">
        <input type="file" id="fi" hidden accept=".pdf">
        <div id="it"><strong>SELECT PDF FILE</strong><br><small style="color:#9ca3af">Direct Local Conversion</small></div>
        <div id="st">READY</div>
    </div>
    <button class="btn" id="db">DOWNLOAD WORD DOCUMENT</button>

    <script>
        const st = document.getElementById('st'), fi = document.getElementById('fi'), 
              dz = document.getElementById('dz'), db = document.getElementById('db');

        dz.onclick = () => fi.click();

        fi.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            st.innerText = "LOCAL PROCESSING STARTED...";
            
            try {
                // THE CRITICAL FIX: Disable workers entirely to bypass Chrome Permission Halt
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = ''; // Leave blank or false

                const arrayBuffer = await file.arrayBuffer();
                
                // Loading PDF with "DisableWorker: true" to force main-thread execution
                const pdf = await pdfjsLib.getDocument({
                    data: arrayBuffer,
                    disableWorker: true, // Forces Chrome to allow the code to run
                    verbosity: 0
                }).promise;

                const sections = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    st.innerText = `CONVERTING PAGE ${i}/${pdf.numPages}`;
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    
                    const lines = {};
                    text.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) lines[y] = [];
                        lines[y].push(item);
                    });

                    const children = Object.keys(lines).sort((a,b) => b-a).map(y => {
                        const lineText = lines[y].sort((a,b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                        return new docx.Paragraph({ children: [new docx.TextRun({ text: lineText, size: 22 })] });
                    });
                    sections.push({ children });
                }

                const doc = new docx.Document({ sections });
                const blob = await docx.Packer.toBlob(doc);
                
                st.innerText = "✓ CONVERSION SUCCESSFUL";
                db.style.display = "block";
                db.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                    a.click();
                };
            } catch (err) {
                st.innerText = "SYSTEM ERROR: TRY SMALLER PDF";
                console.error(err);
            }
        };
    </script>
</body>
</html>
