<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valipod Secure Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
    <style>
        :root { --bg: #030712; --accent: #0ea5e9; --text: #f3f4f6; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: 40px auto; border: 2px dashed #374151; border-radius: 16px; padding: 60px 20px; background: #111827; cursor: pointer; }
        .st { font-size: 11px; color: var(--accent); margin-top: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .btn { display: none; background: var(--accent); color: white; padding: 16px; border-radius: 10px; border: none; width: 100%; max-width: 400px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="dz">
        <input type="file" id="fi" hidden accept=".pdf">
        <div id="it"><strong>SELECT PDF FILE</strong><br><small style="color:#9ca3af">Direct Local Reconstruction</small></div>
        <div class="st" id="st">ENGINE INITIALIZING...</div>
    </div>
    <button class="btn" id="db">DOWNLOAD WORD DOCUMENT</button>

    <script>
        const st = document.getElementById('st'), fi = document.getElementById('fi'), 
              dz = document.getElementById('dz'), db = document.getElementById('db');

        // Bypassing the "File Access Error" by creating a local Worker Proxy
        async function getSafeWorker() {
            const workerUrl = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
            const response = await fetch(workerUrl);
            const script = await response.text();
            const blob = new Blob([script], { type: 'application/javascript' });
            return URL.createObjectURL(blob);
        }

        dz.onclick = () => fi.click();

        // Check if libraries loaded
        window.onload = () => { if(window['pdfjs-dist/build/pdf']) st.innerText = "READY"; };

        fi.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            st.innerText = "OPENING SECURE SANDBOX...";
            
            try {
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                // This is the critical fix for Chrome "File Access" errors
                pdfjsLib.GlobalWorkerOptions.workerSrc = await getSafeWorker();

                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                const sections = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    st.innerText = `READING PAGE ${i}/${pdf.numPages}`;
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    
                    // Logic-First Layout Mapping
                    const lines = {};
                    text.items.forEach(item => {
                        const y = Math.round(item.transform[5]);
                        if (!lines[y]) lines[y] = [];
                        lines[y].push(item);
                    });

                    const children = Object.keys(lines).sort((a,b) => b-a).map(y => {
                        const lineText = lines[y].sort((a,b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                        return new docx.Paragraph({ children: [new docx.TextRun({ text: lineText, size: 22 })] });
                    });
                    sections.push({ children });
                }

                const doc = new docx.Document({ sections });
                const blob = await docx.Packer.toBlob(doc);
                
                st.innerText = "✓ SUCCESSFUL";
                db.style.display = "block";
                db.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                    a.click();
                };
            } catch (err) {
                st.innerText = "HALT: LOCAL PERMISSION DENIED";
                console.error("Detailed Error:", err);
            }
        };
    </script>
</body>
</html>
