<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valipod Engine | High-Fidelity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: #111827; --accent: #0ea5e9; --success: #22c55e; --text: #f3f4f6; --muted: #9ca3af; --border: #1f2937; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 450px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .hero h1 { font-size: 2rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .hero p { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
        .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 50px 20px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--accent); background: rgba(14, 165, 233, 0.05); }
        .status { font-size: 11px; font-weight: 800; color: var(--accent); margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-wrap { display: none; width: 100%; background: #1f2937; height: 4px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
        .btn-dl { display: none; width: 100%; background: var(--accent); color: white; padding: 18px; border-radius: 12px; border: none; font-weight: 800; margin-top: 20px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="hero">
        <h1>PDF to Word</h1>
        <p>Private reconstruction in your browser.</p>
    </div>

    <div class="drop-zone" id="dz">
        <input type="file" id="fi" hidden accept=".pdf">
        <div id="idle-ui">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent); margin-bottom:12px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <h3 style="margin:0;">Select PDF</h3>
        </div>
        <div class="status" id="st">READY</div>
    </div>

    <div class="progress-wrap" id="pw"><div class="progress-bar" id="pb"></div></div>
    <button class="btn-dl" id="db">DOWNLOAD WORD DOCUMENT</button>
</div>

<script>
    const st = document.getElementById('st'), fi = document.getElementById('fi'), 
          dz = document.getElementById('dz'), db = document.getElementById('db'),
          pw = document.getElementById('pw'), pb = document.getElementById('pb');

    dz.onclick = () => fi.click();

    fi.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        st.innerText = "Initializing Engine...";
        pw.style.display = "block";
        pb.style.width = "10%";

        try {
            // FIX 1: Explicitly force the library to use internal memory for Wix compatibility
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = ''; 

            const arrayBuffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({
                data: arrayBuffer,
                disableWorker: true, // Forces Main Thread
                useSystemFonts: true
            });

            const pdf = await loadingTask.promise;
            const sections = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                st.innerText = `Processing: ${Math.round((i/pdf.numPages)*100)}%`;
                pb.style.width = `${(i / pdf.numPages) * 90}%`;

                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                const rows = {};
                textContent.items.forEach(item => {
                    const y = Math.round(item.transform[5]);
                    if (!rows[y]) rows[y] = [];
                    rows[y].push(item);
                });

                const paragraphs = Object.keys(rows).sort((a, b) => b - a).map(y => {
                    const lineText = rows[y].sort((a, b) => a.transform[4] - b.transform[4]).map(it => it.str).join(" ");
                    return new docx.Paragraph({
                        children: [new docx.TextRun({ text: lineText, size: 22 })],
                        spacing: { before: 120 }
                    });
                });
                sections.push({ children: paragraphs });
            }

            pb.style.width = "100%";
            st.innerText = "✓ Success";
            st.style.color = "var(--success)";
            
            // FIX 2: Generate the Blob immediately and keep it in memory
            const doc = new docx.Document({ sections });
            const docBlob = await docx.Packer.toBlob(doc);
            
            db.style.display = "block";
            db.onclick = () => {
                // FIX 3: Hardened download trigger for Wix Iframes
                const url = window.URL.createObjectURL(docBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = file.name.replace(".pdf", "") + "_Valipod.docx";
                document.body.appendChild(a);
                a.click();
                
                // Cleanup to prevent memory leaks
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

        } catch (err) {
            console.error(err);
            st.innerText = "Error: File Encrypted or Blocked";
            st.style.color = "#ef4444";
        }
    };
</script>
</body>
</html>
